<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서비스 점검 안내 | ClassicHub</title>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-main: #1a1a1a;
        --text-sub: #666666;
        --accent: #cc0000; /* 클래식한 느낌의 골드/베이지 톤 */
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: var(--bg-color);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: var(--text-main);
        text-align: center;
      }

      .container {
        max-width: 400px;
        padding: 20px;
      }

      .logo {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        margin-bottom: 40px;
        color: var(--text-main);
        text-transform: uppercase;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 20px;
        color: var(--accent);
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 16px;
      }

      p {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--text-sub);
        margin-bottom: 30px;
        word-break: keep-all;
      }

      .footer {
        margin-top: 50px;
        font-size: 0.8rem;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">ClassicHub</div>

      <div class="icon">🛠</div>

      <h1>서비스 점검 중입니다</h1>

      <p>
        더욱 안정적인 공연 정보 서비스를 제공하기 위해<br />
        현재 시스템 최적화 작업을 진행하고 있습니다.<br />
        이용에 불편을 드려 죄송합니다.
      </p>
      <div class="footer">&copy; 2026 ClassicHub. All rights reserved.</div>
    </div>
  </body>
</html>
