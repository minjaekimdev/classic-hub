# 워크플로우의 이름
name: Performance Update

# 워크플로우 실행 조건
on:
  schedule:
    # UTC 기준 매일 15:00 (한국 시간 자정)에 실행
    - cron: "0 15 * * *"

  workflow_dispatch:
    # 수동 실행을 위한 버튼 제공

# 실행할 작업 정의
jobs:
  run-daily-job: # job id
    # 작업이 실행될 환경
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    # 작업의 단계(steps) 정의
    steps:
      # 1. 리포지토리 코드를 가상 머신으로 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js 실행 환경 설치
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: 'google-github-actions/auth@v3'
        with:
          project_id: 'project-a9ba8193-3b4b-4ac6-8ef'
          workload_identity_provider: 'projects/395932571942/locations/global/workloadIdentityPools/my-pool/providers/my-provider'

      # 3. 필요한 라이브러리 설치 (npm 사용)
      # package.json 파일에 명시된 모든 의존성을 설치합니다.
      - name: Install dependencies
        run: npm install
        working-directory: ./packages/backend

      # 4. 데이터 업데이트 스크립트 실행
      # 'deno run' 대신 'npx ts-node'를 사용해 TypeScript 파일을 직접 실행
      - name: Run daily tasks runner script
        run: "npx tsx ./infrastructure/jobs/updatePerformances.ts"
        working-directory: ./packages/backend

        # 환경 변수 주입 방식은 동일합니다.
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KOPIS_SERVICE_KEY: ${{ secrets.KOPIS_SERVICE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Upload Failed Data as Artifact
      # upload-artifact: 파일을 자동으로 artifact로 옮겨줌
      # 아티팩트는 워크플로우별로 별개의 파일이 생성된다.
        uses: actions/upload-artifact@v4
        # always(): 에러가 나도 업로드(실패한 데이터 보관) 단계는 무조건 실행한다.
        if: always()
        with:
          # github.run_id: 실행의 고유 일련번호, 자동으로 부여된다.
          name: failed-performances-${{ github.run_id }}
          path: packages/backend/failed_records.json
          retention-days: 5 
          # 에러가 발생하지 않아서 failed_records.json 파일이 없는 경우에도 경고가 뜨지 않는다.
          if-no-files-found: ignore
