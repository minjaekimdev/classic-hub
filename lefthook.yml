# lefthook.yml
pre-push:
  parallel: true
  commands:
    backend-integrity:
      # 백엔드 코드나 shared가 바뀌었을 때 실행
      glob: "{packages/backend/**/*,packages/shared/**/*,scripts/**/*}"
      run: bash ./scripts/test-backend.sh

    frontend-check:
      # 프론트엔드 코드나 shared가 바뀌었을 때 실행
      glob: "{packages/frontend/**/*,packages/shared/**/*}"
      run: npx turbo run build --filter=frontend